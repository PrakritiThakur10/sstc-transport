<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flexbox Toggle</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    header {
      background: #333;
      color: white;
      padding: 10px;
      text-align: center;
    }

    .flex-container {
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: #ddd;
      padding: 10px;
    }

    .toggle-content {
      display: none;
      padding: 20px;
      margin: 10px;
      border: 1px solid #aaa;
      background: #fff;
    }

    .toggle-content:target {
      display: block;
    }

    .toggle-text {
      text-decoration: none;
      color: #333;
    }

    .toggle-text:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1>Flexbox Toggle Example</h1>
  </header>

  <div class="flex-container">
    <a href="#home" class="toggle-text">Home</a>
    <a href="#about" class="toggle-text">About</a>
    <a href="#contact" class="toggle-text">Contact</a>
  </div>

  <div class="toggle-content" id="home">
    <h2>Home Content</h2>
    <p>This is the content for the Home section.</p>
  </div>

  <div class="toggle-content" id="about">
    <h2>About Content</h2>
    <p>This is the content for the About section.</p>
  </div>

  <div class="toggle-content" id="contact">
    <h2>Contact Content</h2>
    <p>This is the content for the Contact section.</p>
  </div>
</body>
</html>
