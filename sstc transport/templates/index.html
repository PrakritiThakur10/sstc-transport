{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title mb-0">Book Transportation</h3>
            </div>
            <div class="card-body">
                <form id="bookingForm">
                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="name" name="name" required>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>

                    <div class="mb-3">
                        <label for="phone" class="form-label">Phone Number</label>
                        <div class="input-group">
                            <input type="tel" 
                                   class="form-control" 
                                   id="phone" 
                                   name="phone" 
                                   pattern="\+91[0-9]{10}"
                                   placeholder="+91XXXXXXXXXX"
                                   title="Please enter phone number in format: +91 followed by 10 digits"
                                   required>
                            <span class="input-group-text" data-bs-toggle="tooltip" 
                                  data-bs-placement="right" 
                                  title="Enter your 10-digit phone number with +91 prefix">
                                <i data-feather="help-circle"></i>
                            </span>
                        </div>
                        <div class="form-text">Format: +91 followed by your 10 digit number (e.g., +919876543210)</div>
                    </div>

                    <div class="mb-3">
                        <label for="pickup" class="form-label">Pickup Location</label>
                        <input type="text" class="form-control" id="pickup" name="pickup" required>
                    </div>

                    <div class="mb-3">
                        <label for="dropoff" class="form-label">Drop-off Location</label>
                        <input type="text" class="form-control" id="dropoff" name="dropoff" required>
                    </div>

                    <div class="mb-3">
                        <label for="quantity" class="form-label">Quantity (in tons)</label>
                        <input type="number" class="form-control" id="quantity" name="quantity" min="1" value="1" required>
                    </div>

                    <div class="alert alert-info" id="priceEstimate" style="display: none;">
                        <p>Estimated Distance: <span id="distance">0</span> km</p>
                        <p>Total Price: ₹<span id="price">0</span></p>
                    </div>

                    <button type="submit" class="btn btn-primary">Book Now</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="bookingModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Booking Confirmed!</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="bookingDetails"></div>
                <div class="mt-3">
                    <a href="#" id="trackingLink" class="btn btn-info">Track Order</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/booking.js') }}"></script>
<script>
    // Initialize tooltips
    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) {
        return new bootstrap.Tooltip(tooltipTriggerEl)
    })
</script>
{% endblock %}
